<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede8ff"/>
      <stop offset="100%" style="stop-color:#f8f4ff"/>
    </linearGradient>
    <radialGradient id="g1" cx="0%" cy="100%" r="70%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g3" cx="10%" cy="0%" r="55%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g4" cx="90%" cy="0%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>
  <rect width="1200" height="630" fill="url(#g4)"/>

  <!-- Grid lines -->
  <g stroke="rgba(15,10,40,.06)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Main headline - line 1 -->
  <text x="96" y="200" font-family="system-ui,sans-serif" font-weight="800" font-size="82" fill="#1a1035" letter-spacing="-2">TURNING COMPLEXITY</text>
  <!-- line 2 -->
  <text x="96" y="298" font-family="system-ui,sans-serif" font-weight="800" font-size="82" fill="#1a1035" letter-spacing="-2">INTO CLARITY AND</text>
  <!-- line 3 gradient -->
  <text x="96" y="396" font-family="system-ui,sans-serif" font-weight="800" font-size="82" fill="url(#textgrad)" letter-spacing="-2">REAL IMPACT.</text>

  <!-- Gradient accent line -->
  <rect x="96" y="420" width="280" height="4" rx="2" fill="url(#textgrad)"/>

  <!-- Author + title -->
  <text x="96" y="490" font-family="system-ui,sans-serif" font-weight="600" font-size="26" fill="rgba(15,10,40,.65)">Flavia Canelo</text>
  <text x="96" y="526" font-family="system-ui,sans-serif" font-weight="300" font-size="22" fill="rgba(15,10,40,.45)">UX / CX Research Lead · Service Design · Barcelona</text>

  <!-- URL -->
  <text x="1104" y="598" text-anchor="end" font-family="system-ui,sans-serif" font-size="16" fill="rgba(15,10,40,.28)">flavia1980.github.io/portfolio-flavia</text>
</svg>
